<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profesyonel OCR Bozucu</title>
    <style>
        body { background: #000; color: #ccc; font-family: sans-serif; text-align: center; padding: 40px; }
        .box { border: 1px dashed #444; padding: 20px; display: inline-block; background: #111; border-radius: 8px; }
        canvas { border: 1px solid #222; margin-top: 20px; max-width: 100%; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
        input[type="file"] { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Görünmez OCR Koruması</h3>
        <input type="file" id="loader" accept="image/*"><br>
        <button onclick="applyShift()">Görünmez Korumayı Uygula</button>
        <button onclick="download()" style="background: #28a745;">Kaydet</button>
    </div>

    <br>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let img = new Image();

        document.getElementById('loader').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applyShift() {
            const w = canvas.width;
            const h = canvas.height;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tCtx = tempCanvas.getContext('2d');
            
            // Görseli çok ince dikey şeritlere böl (2px genişlikte)
            const stripWidth = 2; 
            
            for (let x = 0; x < w; x += stripWidth) {
                // Her şeridi rastgele 1 veya 2 piksel yukarı/aşağı kaydır
                const offset = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2);
                tCtx.drawImage(canvas, x, 0, stripWidth, h, x, offset, stripWidth, h);
            }
            
            // Orijinal canvas'ı temizle ve kaydırılmış halini bas
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(tempCanvas, 0, 0);
            
            // OCR'ı tamamen kör etmek için: Çok ince, şeffaf bir 'ızgara' ekle (İnsan görmez)
            ctx.strokeStyle = "rgba(255,255,255,0.03)"; 
            for(let i=0; i<w; i+=4) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }
        }

        function download() {
            const a = document.createElement('a');
            a.download = 'sys_cycle_protected.png';
            a.href = canvas.toDataURL("image/png");
            a.click();
        }
    </script>
</body>
</html>
