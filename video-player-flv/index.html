<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern HTML5 Video Player</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #0f172a;
            --control-bg: rgba(15, 23, 42, 0.85);
            --text-color: #f8fafc;
            --accent-color: rgba(59, 130, 246, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            user-select: none;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .video-container.show-controls .video-controls {
            opacity: 1;
            visibility: visible;
        }

        .progress-area {
            height: 5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            border-radius: 10px;
            position: relative;
            transition: height 0.1s ease;
            display: flex;
            align-items: center;
        }

        .progress-area:hover, .progress-area.dragging {
            height: 8px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            border-radius: 10px;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .progress-area:hover .progress-bar::after, 
        .progress-area.dragging .progress-bar::after {
            opacity: 1;
        }

        .controls-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: transform 0.1s ease, color 0.2s ease, opacity 0.2s ease;
            outline: none;
        }

        .control-btn:hover {
            color: var(--primary-color);
        }

        .time-display {
            font-size: 14px;
            font-variant-numeric: tabular-nums;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 0;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            transition: width 0.3s ease;
            overflow: hidden;
            cursor: pointer;
            outline: none;
        }

        .volume-container:hover .volume-slider {
            width: 80px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            background: #fff;
            box-shadow: -80px 0 0 80px var(--primary-color);
        }

        .speed-menu {
            position: absolute;
            bottom: 45px;
            right: 0;
            background: var(--control-bg);
            border-radius: 8px;
            padding: 8px 0;
            min-width: 120px;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 30;
        }

        .speed-menu.active {
            display: flex;
            animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .speed-item {
            padding: 10px 16px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .speed-item:hover {
            background: var(--accent-color);
            color: var(--primary-color);
        }

        .speed-item.selected {
            color: var(--primary-color);
            font-weight: 600;
        }

        .speed-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            backdrop-filter: blur(4px);
            z-index: 15;
            pointer-events: none;
        }

        .speed-badge.active {
            display: flex;
        }

        .overlay-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--primary-color);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 5;
            pointer-events: none;
        }

        .video-container.show-controls:not(.playing) .overlay-play,
        .video-container.ended .overlay-play {
            opacity: 0.95;
            visibility: visible;
            pointer-events: auto;
        }

        .seek-ripple {
            position: absolute;
            top: 0;
            width: 40%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .seek-ripple.left { left: 0; border-radius: 0 50% 50% 0; }
        .seek-ripple.right { right: 0; border-radius: 50% 0 0 50%; }

        .seek-text {
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-top: 8px;
        }

        .seek-ripple.active {
            animation: rippleAnim 0.7s ease-out;
        }

        @keyframes rippleAnim {
            0% { opacity: 0; transform: scale(0.8); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.2); }
        }

        svg {
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="video-container show-controls" id="video_player">
        <video id="main_video" playsinline preload="auto">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <div class="speed-badge" id="speed_badge">
            <i data-lucide="zap" style="width: 16px; height: 16px;"></i>
            <span>2x Oynatılıyor</span>
        </div>

        <div class="seek-ripple left" id="ripple_left">
            <i data-lucide="chevrons-left" style="width: 40px; height: 40px;"></i>
            <span class="seek-text">« 10</span>
        </div>
        <div class="seek-ripple right" id="ripple_right">
            <i data-lucide="chevrons-right" style="width: 40px; height: 40px;"></i>
            <span class="seek-text">10 »</span>
        </div>

        <div class="overlay-play" id="overlay_btn">
            <i data-lucide="play" id="overlay_icon" style="width: 32px; height: 32px; color: white;"></i>
        </div>

        <div class="video-controls">
            <div class="progress-area" id="progress_area">
                <div class="progress-bar"></div>
            </div>

            <div class="controls-main">
                <div class="controls-left">
                    <button class="control-btn" id="play_pause">
                        <i data-lucide="play"></i>
                    </button>
                    <div class="volume-container">
                        <button class="control-btn" id="mute_btn">
                            <i data-lucide="volume-2"></i>
                        </button>
                        <input type="range" class="volume-slider" id="volume_slider" min="0" max="1" step="0.1" value="1">
                    </div>
                    <div class="time-display">
                        <span id="current_time">0:00</span> / <span id="duration">...</span>
                    </div>
                </div>

                <div class="controls-right">
                    <button class="control-btn" id="speed_btn">
                        <i data-lucide="gauge"></i>
                    </button>
                    <div class="speed-menu" id="speed_menu">
                        <div class="speed-item" data-speed="0.5"><span>0.5x</span></div>
                        <div class="speed-item" data-speed="0.75"><span>0.75x</span></div>
                        <div class="speed-item selected" data-speed="1"><span>Normal</span></div>
                        <div class="speed-item" data-speed="1.25"><span>1.25x</span></div>
                        <div class="speed-item" data-speed="1.5"><span>1.5x</span></div>
                        <div class="speed-item" data-speed="2"><span>2x</span></div>
                    </div>
                    <button class="control-btn" id="fullscreen_btn">
                        <i data-lucide="maximize"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function refreshIcons() {
            if (window.lucide) window.lucide.createIcons();
        }

        window.onload = function() {
            const container = document.getElementById('video_player');
            const video = document.getElementById('main_video');
            const playPauseBtn = document.getElementById('play_pause');
            const overlayBtn = document.getElementById('overlay_btn');
            const progressArea = document.getElementById('progress_area');
            const progressBar = progressArea.querySelector('.progress-bar');
            const volumeSlider = document.getElementById('volume_slider');
            const muteBtn = document.getElementById('mute_btn');
            const currentTimeEl = document.getElementById('current_time');
            const durationEl = document.getElementById('duration');
            const speedBtn = document.getElementById('speed_btn');
            const speedMenu = document.getElementById('speed_menu');
            const speedItems = document.querySelectorAll('.speed-item');
            const fullscreenBtn = document.getElementById('fullscreen_btn');
            const rippleLeft = document.getElementById('ripple_left');
            const rippleRight = document.getElementById('ripple_right');
            const speedBadge = document.getElementById('speed_badge');

            let hideControlsTimeout;
            let isTouchDevice = false;
            let isDragging = false;
            let holdTimeout;
            let originalSpeed = 1;

            refreshIcons();

            container.addEventListener('contextmenu', e => e.preventDefault());

            function formatTime(time) {
                if (isNaN(time) || time === Infinity || time < 0) return "0:00";
                let min = Math.floor(time / 60);
                let sec = Math.floor(time % 60);
                return `${min}:${sec < 10 ? '0' + sec : sec}`;
            }

            function updateDurationDisplay() {
                if (video.duration && video.duration !== Infinity && !isNaN(video.duration)) {
                    durationEl.innerText = formatTime(video.duration);
                }
            }

            function showControls() {
                container.classList.add('show-controls');
                clearTimeout(hideControlsTimeout);
                if (!video.paused && !video.ended && !speedMenu.classList.contains('active') && !isDragging) {
                    hideControlsTimeout = setTimeout(hideControls, 3000);
                }
            }

            function hideControls() {
                if (isDragging) return;
                container.classList.remove('show-controls');
                clearTimeout(hideControlsTimeout);
                speedMenu.classList.remove('active');
            }

            function showRipple(element) {
                element.classList.remove('active');
                void element.offsetWidth;
                element.classList.add('active');
            }

            const startSpeedBoost = (e) => {
                if (e.touches && e.touches.length !== 1) {
                    endSpeedBoost();
                    return;
                }
                
                if (video.paused || video.ended || isDragging || e.target.closest('#progress_area')) return;
                
                holdTimeout = setTimeout(() => {
                    originalSpeed = video.playbackRate;
                    video.playbackRate = 2.0;
                    speedBadge.classList.add('active');
                    container.classList.remove('show-controls');
                }, 400); 
            };

            const endSpeedBoost = () => {
                clearTimeout(holdTimeout);
                if (speedBadge.classList.contains('active')) {
                    video.playbackRate = originalSpeed;
                    speedBadge.classList.remove('active');
                    showControls();
                }
            };

            container.addEventListener('mousedown', startSpeedBoost);
            window.addEventListener('mouseup', endSpeedBoost);
            
            container.addEventListener('touchstart', (e) => {
                isTouchDevice = true;
                if (e.touches.length === 1) {
                    startSpeedBoost(e);
                } else {
                    endSpeedBoost();
                }
            }, {passive: true});
            
            window.addEventListener('touchend', endSpeedBoost);
            window.addEventListener('touchcancel', endSpeedBoost);
            
            container.addEventListener('dblclick', (e) => {
                if(e.target.closest('#progress_area')) return;
                
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const isAtEnd = video.currentTime >= (video.duration - 0.2);
                
                if (x < rect.width / 2) {
                    video.currentTime = Math.max(0, video.currentTime - 10);
                    showRipple(rippleLeft);
                } else {
                    if (video.duration && !isAtEnd) {
                        video.currentTime = Math.min(video.duration, video.currentTime + 10);
                        showRipple(rippleRight);
                    }
                }
                
                if (video.currentTime < (video.duration - 0.5)) {
                    container.classList.remove('ended');
                    updatePlayIcon(video.paused ? 'play' : 'pause');
                }
                showControls();
            });

            container.addEventListener('mousemove', () => {
                if (!isTouchDevice) showControls();
            });

            container.addEventListener('click', (e) => {
                if (e.target === container || e.target === video) {
                    if (container.classList.contains('show-controls')) hideControls();
                    else showControls();
                }
            });

            function checkAndSetEndState() {
                if (!video.duration || isDragging) return;
                
                const isVeryNearEnd = video.currentTime >= video.duration - 0.2;
                
                if (isVeryNearEnd) {
                    container.classList.remove('playing');
                    container.classList.add('ended');
                    updatePlayIcon('rotate-ccw');
                    showControls();
                    endSpeedBoost();
                } else {
                    container.classList.remove('ended');
                    updatePlayIcon(video.paused ? 'play' : 'pause');
                }
            }

            video.addEventListener('loadedmetadata', updateDurationDisplay);
            video.addEventListener('durationchange', updateDurationDisplay);
            video.addEventListener('timeupdate', () => {
                if (video.duration && !isDragging) {
                    if (durationEl.innerText === "..." || durationEl.innerText === "0:00") {
                        updateDurationDisplay();
                    }
                    progressBar.style.width = `${(video.currentTime / video.duration) * 100}%`;
                    checkAndSetEndState();
                }
                currentTimeEl.innerText = formatTime(video.currentTime);
            });

            video.addEventListener('ended', () => {
                checkAndSetEndState();
            });

            async function togglePlay() {
                if (container.classList.contains('ended')) {
                    video.currentTime = 0;
                    container.classList.remove('ended');
                }

                if (video.paused) {
                    try {
                        await video.play();
                        container.classList.add('playing');
                        updatePlayIcon('pause');
                        showControls();
                    } catch (e) { console.error(e); }
                } else {
                    video.pause();
                    container.classList.remove('playing');
                    updatePlayIcon('play');
                    showControls();
                }
            }

            function updatePlayIcon(name) {
                playPauseBtn.innerHTML = `<i data-lucide="${name}"></i>`;
                overlayBtn.innerHTML = `<i data-lucide="${name}" style="width: 32px; height: 32px; color: white;"></i>`;
                refreshIcons();
            }

            function updateProgress(clientX) {
                const rect = progressArea.getBoundingClientRect();
                let pos = (clientX - rect.left) / rect.width;
                pos = Math.max(0, Math.min(1, pos));
                
                if (video.duration && video.duration !== Infinity) {
                    video.currentTime = pos * video.duration;
                    progressBar.style.width = `${pos * 100}%`;
                    currentTimeEl.innerText = formatTime(video.currentTime);
                    
                    if (pos < 0.98) {
                        container.classList.remove('ended');
                        updatePlayIcon(video.paused ? 'play' : 'pause');
                    }
                }
            }

            function startDragging(e) {
                isDragging = true;
                clearTimeout(holdTimeout);
                progressArea.classList.add('dragging');
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                updateProgress(clientX);
                showControls();
            }

            function onDragging(e) {
                if (!isDragging) return;
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                updateProgress(clientX);
            }

            function stopDragging() {
                if (isDragging) {
                    isDragging = false;
                    progressArea.classList.remove('dragging');
                    checkAndSetEndState();
                    showControls();
                }
            }

            progressArea.addEventListener('mousedown', startDragging);
            window.addEventListener('mousemove', onDragging);
            window.addEventListener('mouseup', stopDragging);

            progressArea.addEventListener('touchstart', startDragging, { passive: false });
            window.addEventListener('touchmove', (e) => {
                if(isDragging) {
                    e.preventDefault();
                    onDragging(e);
                }
            }, { passive: false });
            window.addEventListener('touchend', stopDragging);

            playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
            overlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

            speedBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                endSpeedBoost();
                speedMenu.classList.toggle('active');
            });

            speedBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                endSpeedBoost();
            }, { passive:true });

            speedItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    video.playbackRate = parseFloat(item.dataset.speed);
                    originalSpeed = video.playbackRate; 
                    speedItems.forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    speedMenu.classList.remove('active');
                });
            });

            volumeSlider.addEventListener('input', (e) => {
                video.volume = e.target.value;
                muteBtn.innerHTML = `<i data-lucide="${video.volume == 0 ? 'volume-x' : 'volume-2'}"></i>`;
                refreshIcons();
            });

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                video.volume = video.volume > 0 ? 0 : 1;
                volumeSlider.value = video.volume;
                muteBtn.innerHTML = `<i data-lucide="${video.volume == 0 ? 'volume-x' : 'volume-2'}"></i>`;
                refreshIcons();
            });

            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) container.requestFullscreen().catch(() => {});
                else document.exitFullscreen();
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === "Space") { e.preventDefault(); togglePlay(); }
            });

            setTimeout(updateDurationDisplay, 1000);
            showControls();
        };
    </script>
</body>
</html>
