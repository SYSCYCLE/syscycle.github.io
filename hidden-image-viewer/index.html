<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to Pixel Grid</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: monospace;
            padding: 1rem;
            background: #1e1e1e;
            color: #eee;
            margin: 0;
        }
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1rem;
        }
        .pixel-grid {
            display: grid;
            width: fit-content;
            max-width: 100%;
            border: 2px solid #444;
            background: #111;
            image-rendering: pixelated;
        }
        .pixel {
            width: 4px;
            height: 4px;
            flex-shrink: 0;
        }
        #info {
            margin-top: 1rem;
            white-space: pre-wrap;
            text-align: center;
        }
        input, button {
            padding: 0.5rem;
            font-size: 1rem;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
        }
        #controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        #scaleContainer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #output {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept="image/*">
    <div id="scaleContainer">
        <label>Piksel boyutu: <span id="scaleValue">4</span>px</label>
        <input type="range" id="scaleSlider" min="1" max="12" value="4" step="1">
    </div>
</div>
<div id="info">📁 Görsel seçin – her piksel bir div, max 200×200 piksel.</div>
<div id="container">
    <div id="output"></div>
</div>

<script>
    const wasmCode = new Uint8Array([
        0, 97, 115, 109, 1, 0, 0, 0, 1, 6, 1, 96, 2, 127, 127, 0, 3, 2, 1, 0, 5, 3, 1, 0, 1, 7, 20, 2, 6, 109, 101, 109, 111, 114, 121, 2, 0, 7, 112, 114, 111, 99, 101, 115, 115, 0, 0, 10, 4, 1, 2, 0, 11, 0, 20, 4, 110, 97, 109, 101, 2, 13, 1, 0, 2, 0, 3, 112, 116, 114, 1, 3, 108, 101, 110
    ]);

    const fileInput = document.getElementById('fileInput');
    const outputDiv = document.getElementById('output');
    const info = document.getElementById('info');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');

    let wasmInstance = null;
    let currentPixels = null;
    let currentW = 0, currentH = 0;
    let pixelSize = 4;

    async function loadWasm() {
        try {
            const result = await WebAssembly.instantiate(wasmCode, {});
            wasmInstance = result.instance;
            info.textContent = '✅ WASM passthrough yüklendi. Görsel seçin.';
        } catch (e) {
            info.textContent = '❌ WASM yüklenemedi: ' + e.message;
            console.error(e);
        }
    }
    loadWasm();

    scaleSlider.addEventListener('input', () => {
        pixelSize = parseInt(scaleSlider.value);
        scaleValue.textContent = pixelSize;
        if (currentPixels) {
            renderGrid(currentPixels, currentW, currentH, pixelSize);
        }
    });

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!wasmInstance) {
            info.textContent = '⏳ WASM yükleniyor, bekleyin...';
            return;
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
            const dataUrl = ev.target.result;
            const img = new Image();
            img.onload = () => {
                let w = img.width;
                let h = img.height;
                const MAX_DIM = 800;
                if (w > MAX_DIM || h > MAX_DIM) {
                    const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                    info.textContent = `⚠️ Görsel ${img.width}×${img.height} → ${w}×${h} boyutuna küçültüldü (çökme önlendi).`;
                } else {
                    info.textContent = `📐 ${w}×${h} piksel (orijinal)`;
                }

                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;

                const len = data.length;
                const memory = wasmInstance.exports.memory;
                let view = new Uint8Array(memory.buffer);

                if (view.length < len) {
                    const pagesNeeded = Math.ceil((len - view.length) / 65536) + 1;
                    memory.grow(pagesNeeded);
                    view = new Uint8Array(memory.buffer);
                }

                const offset = 0;
                view.set(data, offset);
                wasmInstance.exports.process(offset, len);
                const processed = view.subarray(offset, offset + len);
                data.set(processed);

                currentPixels = data;
                currentW = w;
                currentH = h;
                renderGrid(data, w, h, pixelSize);

                canvas.width = 0;
                canvas.height = 0;
                img.src = '';
            };
            img.onerror = () => {
                info.textContent = '❌ Görsel yüklenemedi! Dosya bozuk olabilir.';
            };
            img.src = dataUrl;
        };
        reader.readAsDataURL(file);
    });

    function renderGrid(data, w, h, size) {
        const start = performance.now();

        outputDiv.innerHTML = '';

        const grid = document.createElement('div');
        grid.className = 'pixel-grid';
        grid.style.gridTemplateColumns = `repeat(${w}, ${size}px)`;
        grid.style.gridTemplateRows = `repeat(${h}, ${size}px)`;

        const fragment = document.createDocumentFragment();
        const total = w * h;

        for (let i = 0; i < total; i++) {
            const idx = i * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            pixel.style.width = size + 'px';
            pixel.style.height = size + 'px';
            pixel.style.backgroundColor = `rgb(${r},${g},${b})`;
            fragment.appendChild(pixel);
        }

        grid.appendChild(fragment);
        outputDiv.appendChild(grid);

        const elapsed = (performance.now() - start).toFixed(1);
        const pixelCount = total;
        info.textContent += ` | ${pixelCount} piksel, ${elapsed}ms'de oluşturuldu.`;
    }
</script>
</body>
</html>
