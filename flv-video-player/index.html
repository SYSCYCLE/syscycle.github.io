<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FLV File to Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #canvasElement { border: 2px solid #333; margin-top: 10px; background: #000; }
        #videoElement { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <h2>FLV Dosyası Yükle ve Canvas'ta Oynat</h2>
    <input type="file" id="fileInput" accept=".flv">
    <br>
    <canvas id="canvasElement" width="640" height="360"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        
        let flvPlayer = null;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (flvPlayer) {
                flvPlayer.pause();
                flvPlayer.unload();
                flvPlayer.detachMediaElement();
                flvPlayer.destroy();
            }

            const mediaUrl = URL.createObjectURL(file);

            flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: mediaUrl
            });

            flvPlayer.attachMediaElement(video);
            flvPlayer.load();
            flvPlayer.play();
        });

        function drawFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(drawFrame);
        }

        drawFrame();

        video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        });
    </script>
    <video id="videoElement" controls></video>

</body>
</html>
