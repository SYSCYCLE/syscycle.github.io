<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wasm FLV Player</title>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 2rem; border-radius: 12px; text-align: center; }
        canvas { background: #000; margin-top: 20px; border: 2px solid #444; display: none; }
        #status { margin-bottom: 1rem; color: #3498db; }
    </style>
</head>
<body>

<div class="container">
    <h2>FLV to Canvas (Wasm)</h2>
    <div id="status">Wasm Modülü Bekleniyor...</div>
    <input type="file" id="uploader" accept=".flv" disabled>
    <br>
    <canvas id="videoCanvas"></canvas>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    
    const uploader = document.getElementById('uploader');
    const status = document.getElementById('status');
    const canvas = document.getElementById('videoCanvas');
    const ctx = canvas.getContext('2d');

    async function init() {
        try {
            status.innerHTML = "⏳ Wasm Çekirdeği Yükleniyor...";
            await ffmpeg.load();
            status.innerHTML = "✅ Hazır! FLV dosyasını seçin.";
            uploader.disabled = false;
        } catch (e) {
            status.innerHTML = "❌ HATA: Localhost veya HTTPS kullanmalısınız!";
            console.error(e);
        }
    }

    uploader.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerHTML = "⏳ Dekode ediliyor...";
        
        await ffmpeg.FS('writeFile', 'input.flv', await fetchFile(file));

        await ffmpeg.run('-i', 'input.flv', '-t', '1', '-f', 'image2', 'frame%d.png');

        try {
            const data = ffmpeg.FS('readFile', 'frame1.png');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'image/png' }));
            
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.style.display = "block";
                ctx.drawImage(img, 0, 0);
                status.innerHTML = "✅ Kare yakalandı!";
            };
            img.src = url;
        } catch (err) {
            status.innerHTML = "❌ Dosya okunamadı veya geçersiz FLV.";
        }
    });

    init();
</script>
</body>
</html>
