<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wasm FLV Player</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #status { color: #3498db; margin: 20px; font-weight: bold; }
        canvas { background: #000; border: 2px solid #444; max-width: 100%; display: none; margin: 0 auto; }
        .controls { background: #2a2a2a; padding: 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="controls">
    <h2>FLV Wasm Player</h2>
    <div id="status">Wasm Yükleniyor...</div>
    <input type="file" id="uploader" accept=".flv" disabled>
</div>
<br>
<canvas id="videoCanvas"></canvas>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://jsdelivr.net'
    });

    const status = document.getElementById('status');
    const uploader = document.getElementById('uploader');
    const canvas = document.getElementById('videoCanvas');
    const ctx = canvas.getContext('2d');

    async function init() {
        try {
            await ffmpeg.load();
            status.innerHTML = "✅ Hazır! FLV seçin.";
            uploader.disabled = false;
        } catch (e) {
            status.innerHTML = "❌ Hata: Tarayıcı Wasm'ı engelledi.";
            console.error(e);
        }
    }

    uploader.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerHTML = "⏳ İşleniyor...";
        
        await ffmpeg.FS('writeFile', 'test.flv', await fetchFile(file));
        await ffmpeg.run('-i', 'test.flv', '-ss', '00:00:01', '-frames:v', '1', 'out.png');

        try {
            const data = ffmpeg.FS('readFile', 'out.png');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'image/png' }));
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.style.display = "block";
                ctx.drawImage(img, 0, 0);
                status.innerHTML = "✅ Görüntü Dekode Edildi.";
            };
            img.src = url;
        } catch (err) {
            status.innerHTML = "❌ Hata: Kare okunamadı.";
        }
    });

    init();
</script>
</body>
</html>
