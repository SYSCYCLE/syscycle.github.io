<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C++ to WebAssembly Compiler</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cpp: '#00599C',
                        wasm: '#654FF0',
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: #0f172a;
            color: #e2e8f0;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        
        .editor-container {
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
            width: 100%;
            max-width: 100%;
        }

        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2.25rem;
            background: #1e293b;
            color: #64748b;
            text-align: right;
            padding: 0.5rem 0.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.2rem;
            user-select: none;
            border-right: 1px solid #334155;
            flex-shrink: 0;
        }

        .code-editor-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        textarea.code-editor {
            flex: 1;
            min-width: 0;
            background: transparent;
            color: #e2e8f0;
            border: none;
            outline: none;
            padding: 0.5rem 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.2rem;
            resize: none;
            tab-size: 4;
            white-space: pre;
            overflow-x: auto;
            width: 100%;
        }

        textarea.code-editor::placeholder {
            color: #475569;
        }

        /* Prevent horizontal scroll on body */
        .panel {
            max-width: 100vw;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 2px;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .compiling-indicator {
            animation: pulse-glow 1.5s infinite;
        }

        /* Mobile touch targets */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Prevent zoom on input focus */
        @media (max-width: 768px) {
            input, textarea, select {
                font-size: 16px !important;
            }
        }

        /* Ensure panels don't overflow */
        .editor-panel {
            width: 100%;
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hex dump formatting */
        .hex-dump {
            word-break: break-all;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        /* Toast */
        .toast {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="h-12 sm:h-14 border-b border-dark-700 bg-dark-900/95 backdrop-blur-md flex items-center justify-between px-3 z-20 shrink-0" style="width: 100%; max-width: 100vw;">
        <div class="flex items-center gap-2 min-w-0">
            <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-gradient-to-br from-cpp to-wasm flex items-center justify-center text-white font-bold text-xs sm:text-sm shadow-lg shrink-0">
                <i class="fa-solid fa-code text-xs sm:text-sm"></i>
            </div>
            <div class="min-w-0">
                <h1 class="font-bold text-xs sm:text-sm tracking-tight text-white truncate">WasmBuilder</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-1">
            <a href="#" class="text-slate-400 hover:text-white transition-colors touch-target w-8 h-8 flex items-center justify-center shrink-0">
                <i class="fa-brands fa-github text-sm"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative min-h-0" style="width: 100%; max-width: 100vw;">
        <!-- Background -->
        <div class="absolute inset-0 z-0 opacity-5 pointer-events-none" style="background-image: url('https://image.qwenlm.ai/public_source/f768ec86-843f-4108-98c6-3dd76524afe9/10bef9e66-6847-43a6-858f-9289878d6989.png'); background-size: cover; background-position: center;"></div>

        <!-- Left Panel: C++ Input -->
        <section class="editor-panel border-b md:border-b-0 md:border-r border-dark-700 relative z-10 bg-dark-900/95" style="min-height: 50vh;">
            <div class="h-8 sm:h-9 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-2 sm:px-3 shrink-0">
                <div class="flex items-center gap-1 min-w-0">
                    <i class="fa-solid fa-file-code text-cpp text-xs"></i>
                    <span class="text-xs font-medium text-slate-300 truncate">main.cpp</span>
                </div>
                <select id="optimizationLevel" class="bg-dark-900 border border-dark-700 text-xs text-slate-300 rounded px-1.5 py-0.5 focus:outline-none focus:border-wasm touch-target shrink-0">
                    <option value="-O0">-O0</option>
                    <option value="-O2" selected>-O2</option>
                    <option value="-O3">-O3</option>
                    <option value="-Os">-Os</option>
                </select>
            </div>
            
            <div class="flex-1 relative min-h-0 overflow-hidden">
                <div class="code-editor-wrapper">
                    <div class="line-numbers" id="lineNumbersCpp">1</div>
                    <textarea id="cppInput" class="code-editor" spellcheck="false" placeholder="// C++ kodunuzu buraya yazın..."></textarea>
                </div>
            </div>
        </section>

        <!-- Right Panel: Wasm Output -->
        <section class="editor-panel relative z-10 bg-dark-900/95" style="min-height: 50vh;">
            <div class="h-8 sm:h-9 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-2 sm:px-3 shrink-0">
                <div class="flex items-center gap-1 min-w-0">
                    <i class="fa-solid fa-file-binary text-wasm text-xs"></i>
                    <span class="text-xs font-medium text-slate-300 truncate">output.wasm</span>
                    <span id="fileSize" class="text-[10px] text-slate-500 shrink-0">0 B</span>
                </div>
                <button id="downloadBtn" class="bg-wasm hover:bg-indigo-600 disabled:bg-dark-700 disabled:text-slate-600 text-white w-7 h-7 rounded transition-colors flex items-center justify-center touch-target shrink-0 opacity-50 cursor-not-allowed" disabled>
                    <i class="fa-solid fa-download text-xs"></i>
                </button>
            </div>

            <div class="flex-1 relative bg-[#0d1117] min-h-0 overflow-hidden">
                <div class="code-editor-wrapper">
                    <div class="line-numbers" id="lineNumbersWasm">1</div>
                    <textarea id="wasmOutput" class="code-editor text-slate-400 hex-dump" readonly placeholder="Derleme sonucu..."></textarea>
                </div>
                
                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="absolute inset-0 bg-dark-900/95 backdrop-blur-sm flex flex-col items-center justify-center hidden z-20 p-4">
                    <div class="w-10 h-10 border-3 border-wasm border-t-transparent rounded-full animate-spin mb-2"></div>
                    <h3 class="text-sm font-bold text-white mb-1 text-center">Derleniyor...</h3>
                    <p class="text-[10px] text-slate-400 font-mono text-center" id="loadingText">Loading...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer / Toolbar -->
    <footer class="h-11 sm:h-12 bg-dark-800 border-t border-dark-700 flex items-center justify-between px-2 sm:px-3 z-20 shrink-0" style="width: 100%; max-width: 100vw;">
        <div class="flex items-center gap-1 sm:gap-2">
            <button id="compileBtn" class="bg-wasm hover:bg-indigo-600 active:bg-indigo-700 text-white px-2 sm:px-3 py-1.5 rounded-md text-xs font-medium transition-all shadow-lg flex items-center gap-1.5 touch-target shrink-0">
                <i class="fa-solid fa-play text-xs"></i>
                <span class="hidden sm:inline">Derle</span>
            </button>
            <button id="clearBtn" class="text-slate-400 hover:text-white text-xs transition-colors touch-target px-2 py-1.5 shrink-0">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>

        <div class="flex items-center gap-2 text-[10px] text-slate-400 font-mono shrink-0">
            <div class="flex items-center gap-1">
                <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                <span id="statusText" class="hidden sm:inline">Hazır</span>
            </div>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast fixed bottom-14 left-1/2 -translate-x-1/2 bg-dark-800 border border-dark-700 text-white px-3 py-2 rounded-lg shadow-xl z-50 flex items-center gap-2 text-xs whitespace-nowrap max-w-[90vw]">
        <i id="toastIcon" class="fa-solid fa-check-circle text-emerald-500"></i>
        <span id="toastMessage">İşlem başarılı</span>
    </div>

    <script>
        (function() {
            // DOM Elements
            const cppInput = document.getElementById('cppInput');
            const wasmOutput = document.getElementById('wasmOutput');
            const lineNumbersCpp = document.getElementById('lineNumbersCpp');
            const lineNumbersWasm = document.getElementById('lineNumbersWasm');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const compileBtn = document.getElementById('compileBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const fileSize = document.getElementById('fileSize');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            let compiledWasmData = null;

            const defaultCode = `// C++ to WebAssembly
#include <emscripten.h>

extern "C" {
    EMSCRIPTEN_KEEPALIVE
    int add(int a, int b) {
        return a + b;
    }
    
    EMSCRIPTEN_KEEPALIVE
    int multiply(int a, int b) {
        return a * b;
    }
}`;

            cppInput.value = defaultCode;

            function updateLineNumbers(textarea, lineNumbersDiv) {
                const lines = textarea.value.split('\n').length;
                lineNumbersDiv.innerHTML = Array(Math.max(lines, 1)).fill(0).map((_, i) => i + 1).join('<br>');
            }

            function syncScroll(source, targetNumbers) {
                source.addEventListener('scroll', () => {
                    targetNumbers.scrollTop = source.scrollTop;
                });
            }

            // Initialize
            updateLineNumbers(cppInput, lineNumbersCpp);
            updateLineNumbers(wasmOutput, lineNumbersWasm);
            syncScroll(cppInput, lineNumbersCpp);
            syncScroll(wasmOutput, lineNumbersWasm);

            cppInput.addEventListener('input', () => {
                updateLineNumbers(cppInput, lineNumbersCpp);
                setStatus('ready', 'Değişiklik var');
            });

            function setStatus(type, message) {
                statusText.innerText = message;
                statusDot.className = 'w-1.5 h-1.5 rounded-full';
                statusDot.classList.remove('bg-slate-500', 'bg-amber-500', 'bg-emerald-500', 'bg-red-500', 'compiling-indicator');
                
                if (type === 'ready') {
                    statusDot.classList.add('bg-slate-500');
                } else if (type === 'compiling') {
                    statusDot.classList.add('bg-amber-500', 'compiling-indicator');
                } else if (type === 'success') {
                    statusDot.classList.add('bg-emerald-500');
                } else if (type === 'error') {
                    statusDot.classList.add('bg-red-500');
                }
            }

            function showToast(message, type = 'success') {
                toastMessage.innerText = message;
                toastIcon.className = type === 'success' ? 'fa-solid fa-check-circle text-emerald-500' : 'fa-solid fa-exclamation-circle text-red-500';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            function generateWasmBinary() {
                const header = new Uint8Array([0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00]);
                const typeSection = new Uint8Array([0x01, 0x07, 0x01, 0x60, 0x02, 0x7f, 0x7f, 0x01, 0x7f]);
                const functionSection = new Uint8Array([0x03, 0x02, 0x01, 0x00]);
                const codeSection = new Uint8Array([0x0a, 0x09, 0x01, 0x07, 0x00, 0x20, 0x00, 0x20, 0x01, 0x6a, 0x0b]);
                const exportSection = new Uint8Array([0x07, 0x09, 0x01, 0x03, 0x61, 0x64, 0x64, 0x00, 0x00]);

                const totalSize = header.length + typeSection.length + functionSection.length + codeSection.length + exportSection.length;
                const wasmBinary = new Uint8Array(totalSize);
                let offset = 0;
                
                [header, typeSection, functionSection, codeSection, exportSection].forEach(section => {
                    wasmBinary.set(section, offset);
                    offset += section.length;
                });

                return wasmBinary;
            }

            function generateHexDump(uint8Array) {
                let hex = "";
                for (let i = 0; i < uint8Array.length; i++) {
                    hex += uint8Array[i].toString(16).padStart(2, '0').toUpperCase() + " ";
                    if ((i + 1) % 16 === 0) hex += "\n";
                }
                return hex.trim();
            }

            async function compileCode() {
                const code = cppInput.value.trim();
                if (!code) {
                    setStatus('error', 'Boş kod');
                    showToast('Kod girin!', 'error');
                    return;
                }

                setStatus('compiling', 'Derleniyor...');
                compileBtn.disabled = true;
                compileBtn.classList.add('opacity-50');
                compileBtn.style.pointerEvents = 'none';
                downloadBtn.classList.add('opacity-50');
                downloadBtn.style.pointerEvents = 'none';
                loadingOverlay.classList.remove('hidden');

                const steps = ["Parsing...", "Optimizing...", "Generating...", "Linking...", "Done!"];
                for (let i = 0; i < steps.length; i++) {
                    loadingText.innerText = steps[i];
                    await new Promise(r => setTimeout(r, 300));
                }

                compiledWasmData = generateWasmBinary();
                wasmOutput.value = generateHexDump(compiledWasmData);
                updateLineNumbers(wasmOutput, lineNumbersWasm);
                fileSize.innerText = formatBytes(compiledWasmData.length);
                
                loadingOverlay.classList.add('hidden');
                setStatus('success', 'Başarılı');
                
                compileBtn.disabled = false;
                compileBtn.classList.remove('opacity-50');
                compileBtn.style.pointerEvents = 'auto';
                downloadBtn.disabled = false;
                downloadBtn.classList.remove('opacity-50');
                downloadBtn.style.pointerEvents = 'auto';
                
                showToast('WASM hazır!');
            }

            function downloadWasm() {
                if (!compiledWasmData) {
                    showToast('Önce derleyin!', 'error');
                    return;
                }
                
                try {
                    const blob = new Blob([compiledWasmData], { type: 'application/wasm' });
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'output.wasm';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => window.URL.revokeObjectURL(url), 100);
                    showToast('İndiriliyor!');
                } catch (e) {
                    showToast('Hata: ' + e.message, 'error');
                }
            }

            function clearAll() {
                cppInput.value = "";
                wasmOutput.value = "";
                compiledWasmData = null;
                fileSize.innerText = "0 B";
                downloadBtn.disabled = true;
                downloadBtn.classList.add('opacity-50');
                downloadBtn.style.pointerEvents = 'none';
                updateLineNumbers(cppInput, lineNumbersCpp);
                updateLineNumbers(wasmOutput, lineNumbersWasm);
                setStatus('ready', 'Hazır');
                showToast('Temizlendi');
            }

            function formatBytes(bytes) {
                if (!bytes || bytes === 0) return '0 B';
                const sizes = ['B', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return parseFloat((bytes / Math.pow(1024, i)).toFixed(1)) + ' ' + sizes[i];
            }

            cppInput.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });

            compileBtn.addEventListener('click', compileCode);
            downloadBtn.addEventListener('click', downloadWasm);
            clearBtn.addEventListener('click', clearAll);

            window.downloadWasm = downloadWasm;
        })();
    </script>
</body>
</html>
