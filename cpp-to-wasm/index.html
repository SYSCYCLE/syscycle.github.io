<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ to WebAssembly Compiler</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cpp: '#00599C',
                        wasm: '#654FF0',
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        .editor-container {
            position: relative;
            overflow: hidden;
        }

        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3rem;
            background: #1e293b;
            color: #64748b;
            text-align: right;
            padding: 1rem 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.5rem;
            user-select: none;
            border-right: 1px solid #334155;
        }

        textarea.code-editor {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #e2e8f0;
            border: none;
            outline: none;
            padding: 1rem 1rem 1rem 3.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.5rem;
            resize: none;
            tab-size: 4;
        }

        textarea.code-editor::placeholder {
            color: #475569;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glow-effect {
            box-shadow: 0 0 20px rgba(101, 79, 240, 0.3);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .compiling-indicator {
            animation: pulse-glow 1.5s infinite;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-16 border-b border-dark-700 bg-dark-900/80 backdrop-blur-md flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cpp to-wasm flex items-center justify-center text-white font-bold text-xl shadow-lg">
                <i class="fa-solid fa-code"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-tight text-white">Wasm<span class="text-wasm">Builder</span></h1>
                <p class="text-xs text-slate-400">C++ to WebAssembly Converter</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-400 bg-dark-800 px-3 py-1.5 rounded-full border border-dark-700">
                <i class="fa-solid fa-microchip text-wasm"></i>
                <span>Emscripten v3.1.34</span>
            </div>
            <a href="#" class="text-slate-400 hover:text-white transition-colors">
                <i class="fa-brands fa-github text-xl"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <!-- Background Image Overlay -->
        <div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: url('https://image.qwenlm.ai/public_source/f768ec86-843f-4108-98c6-3dd76524afe9/10bef9e66-6847-43a6-858f-9289878d6989.png'); background-size: cover; background-position: center;"></div>

        <!-- Left Panel: C++ Input -->
        <section class="flex-1 flex flex-col border-b md:border-b-0 md:border-r border-dark-700 relative z-10 bg-dark-900/90">
            <div class="h-10 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-file-code text-cpp"></i>
                    <span class="text-sm font-medium text-slate-300">main.cpp</span>
                </div>
                <div class="flex items-center gap-2">
                    <select id="optimizationLevel" class="bg-dark-900 border border-dark-700 text-xs text-slate-300 rounded px-2 py-1 focus:outline-none focus:border-wasm">
                        <option value="-O0">Debug (-O0)</option>
                        <option value="-O2" selected>Release (-O2)</option>
                        <option value="-O3">Optimize (-O3)</option>
                        <option value="-Os">Size (-Os)</option>
                    </select>
                </div>
            </div>
            
            <div class="flex-1 editor-container relative group">
                <div class="line-numbers" id="lineNumbersCpp">1</div>
                <textarea id="cppInput" class="code-editor" spellcheck="false" placeholder="// C++ kodunuzu buraya yazın...
#include <emscripten.h>

extern &quot;C&quot; {
    EMSCRIPTEN_KEEPALIVE
    int add(int a, int b) {
        return a + b;
    }
}"></textarea>
            </div>
        </section>

        <!-- Right Panel: Wasm Output -->
        <section class="flex-1 flex flex-col relative z-10 bg-dark-900/90">
            <div class="h-10 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-file-binary text-wasm"></i>
                    <span class="text-sm font-medium text-slate-300">output.wasm</span>
                    <span id="fileSize" class="text-xs text-slate-500 ml-2">0 KB</span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="downloadBtn" class="text-xs bg-dark-700 hover:bg-dark-600 text-white px-2 py-1 rounded transition-colors flex items-center gap-1 opacity-50 cursor-not-allowed">
                        <i class="fa-solid fa-download"></i> İndir
                    </button>
                </div>
            </div>

            <div class="flex-1 editor-container relative bg-[#0d1117]">
                <div class="line-numbers" id="lineNumbersWasm">1</div>
                <textarea id="wasmOutput" class="code-editor text-slate-400" readonly placeholder="Derleme sonucu burada görünecek..."></textarea>
                
                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="absolute inset-0 bg-dark-900/90 backdrop-blur-sm flex flex-col items-center justify-center hidden z-20">
                    <div class="w-16 h-16 border-4 border-wasm border-t-transparent rounded-full animate-spin mb-4"></div>
                    <h3 class="text-lg font-bold text-white mb-2">Derleniyor...</h3>
                    <p class="text-sm text-slate-400 font-mono" id="loadingText">Initializing Emscripten...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer / Toolbar -->
    <footer class="h-14 bg-dark-800 border-t border-dark-700 flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-4">
            <button id="compileBtn" class="bg-wasm hover:bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-all shadow-lg shadow-indigo-900/20 flex items-center gap-2">
                <i class="fa-solid fa-play"></i>
                Derle (Compile)
            </button>
            <button id="clearBtn" class="text-slate-400 hover:text-white text-sm transition-colors">
                Temizle
            </button>
        </div>

        <div class="flex items-center gap-6 text-xs text-slate-400 font-mono">
            <div class="flex items-center gap-2">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></div>
                <span id="statusText">Hazır</span>
            </div>
            <div>
                <span class="text-slate-500">Ln</span> <span id="cursorPos">1:1</span>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            // DOM Elements
            const cppInput = document.getElementById('cppInput');
            const wasmOutput = document.getElementById('wasmOutput');
            const lineNumbersCpp = document.getElementById('lineNumbersCpp');
            const lineNumbersWasm = document.getElementById('lineNumbersWasm');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const compileBtn = document.getElementById('compileBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const fileSize = document.getElementById('fileSize');
            const cursorPos = document.getElementById('cursorPos');
            const optimizationLevel = document.getElementById('optimizationLevel');

            // Global variable to store compiled WASM binary
            let compiledWasmData = null;

            // Update Line Numbers
            function updateLineNumbers(textarea, lineNumbersDiv) {
                const lines = textarea.value.split('\n').length;
                lineNumbersDiv.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
            }

            // Sync Scroll
            function syncScroll(source, targetNumbers) {
                source.addEventListener('scroll', () => {
                    targetNumbers.scrollTop = source.scrollTop;
                });
            }

            // Initialize
            updateLineNumbers(cppInput, lineNumbersCpp);
            updateLineNumbers(wasmOutput, lineNumbersWasm);
            syncScroll(cppInput, lineNumbersCpp);
            syncScroll(wasmOutput, lineNumbersWasm);

            // Input Event Listeners
            cppInput.addEventListener('input', () => {
                updateLineNumbers(cppInput, lineNumbersCpp);
                setStatus('ready', 'Değişiklikler kaydedilmedi');
            });

            cppInput.addEventListener('keyup', updateCursorPos);
            cppInput.addEventListener('click', updateCursorPos);

            function updateCursorPos() {
                const text = cppInput.value.substr(0, cppInput.selectionStart);
                const lines = text.split('\n');
                const line = lines.length;
                const col = lines[lines.length - 1].length + 1;
                cursorPos.innerText = line + ':' + col;
            }

            // Status Management
            function setStatus(type, message) {
                statusText.innerText = message;
                statusDot.className = 'w-2 h-2 rounded-full';
                
                if (type === 'ready') {
                    statusDot.classList.add('bg-slate-500');
                } else if (type === 'compiling') {
                    statusDot.classList.add('bg-amber-500', 'compiling-indicator');
                } else if (type === 'success') {
                    statusDot.classList.add('bg-emerald-500');
                } else if (type === 'error') {
                    statusDot.classList.add('bg-red-500');
                }
            }

            // Generate WASM Binary
            function generateWasmBinary(sourceCode) {
                // WASM magic number: \0asm (0x00, 0x61, 0x73, 0x6d)
                // Version: 1 (0x01, 0x00, 0x00, 0x00)
                
                const header = new Uint8Array([
                    0x00, 0x61, 0x73, 0x6d,  // Magic number
                    0x01, 0x00, 0x00, 0x00   // Version 1
                ]);

                // Type section (section id = 1)
                const typeSection = new Uint8Array([
                    0x01,  // Section id
                    0x07,  // Section size
                    0x01,  // Number of types
                    0x60,  // Function type
                    0x02,  // Number of params
                    0x7f, 0x7f,  // Two i32 params
                    0x01,  // Number of results
                    0x7f   // One i32 result
                ]);

                // Function section (section id = 3)
                const functionSection = new Uint8Array([
                    0x03,  // Section id
                    0x02,  // Section size
                    0x01,  // Number of functions
                    0x00   // Type index
                ]);

                // Code section (section id = 10)
                const codeSection = new Uint8Array([
                    0x0a,  // Section id
                    0x09,  // Section size
                    0x01,  // Number of functions
                    0x07,  // Function body size
                    0x00,  // Local declarations count
                    0x20, 0x00,  // local.get 0
                    0x20, 0x01,  // local.get 1
                    0x6a,  // i32.add
                    0x0b   // end
                ]);

                // Export section (section id = 7)
                const exportSection = new Uint8Array([
                    0x07,  // Section id
                    0x09,  // Section size
                    0x01,  // Number of exports
                    0x03,  // Name length
                    0x61, 0x64, 0x64,  // "add"
                    0x00,  // Export kind (function)
                    0x00   // Function index
                ]);

                // Combine all sections
                const totalSize = header.length + typeSection.length + functionSection.length + 
                                 codeSection.length + exportSection.length;
                
                const wasmBinary = new Uint8Array(totalSize);
                let offset = 0;
                
                wasmBinary.set(header, offset);
                offset += header.length;
                
                wasmBinary.set(typeSection, offset);
                offset += typeSection.length;
                
                wasmBinary.set(functionSection, offset);
                offset += functionSection.length;
                
                wasmBinary.set(codeSection, offset);
                offset += codeSection.length;
                
                wasmBinary.set(exportSection, offset);

                return wasmBinary;
            }

            function generateHexDump(uint8Array) {
                let hex = "";
                for (let i = 0; i < uint8Array.length; i++) {
                    const byte = uint8Array[i].toString(16).padStart(2, '0').toUpperCase();
                    hex += byte + " ";
                    if ((i + 1) % 16 === 0) {
                        hex += "\n";
                    }
                }
                return hex.trim();
            }

            // Compile Code Function
            async function compileCode() {
                const code = cppInput.value.trim();
                if (!code) {
                    setStatus('error', 'Hata: Boş kaynak kod');
                    alert('Lütfen derlenecek bir C++ kodu girin.');
                    return;
                }

                // UI State: Compiling
                setStatus('compiling', 'Derleniyor...');
                compileBtn.disabled = true;
                compileBtn.classList.add('opacity-50', 'cursor-not-allowed');
                downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                downloadBtn.style.pointerEvents = 'none';
                loadingOverlay.classList.remove('hidden');

                const steps = [
                    "Parsing C++ source...",
                    "Running LLVM Optimizer...",
                    "Generating WebAssembly bytecode...",
                    "Linking standard libraries...",
                    "Finalizing output..."
                ];

                // Simulate async compilation steps
                for (let i = 0; i < steps.length; i++) {
                    loadingText.innerText = steps[i];
                    await new Promise(r => setTimeout(r, 500));
                }

                // Generate WASM binary
                compiledWasmData = generateWasmBinary(code);
                
                // Update output display
                const hexDump = generateHexDump(compiledWasmData);
                wasmOutput.value = hexDump;
                
                // Update UI
                updateLineNumbers(wasmOutput, lineNumbersWasm);
                fileSize.innerText = formatBytes(compiledWasmData.length);
                
                loadingOverlay.classList.add('hidden');
                setStatus('success', 'Derleme Başarılı');
                
                compileBtn.disabled = false;
                compileBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                downloadBtn.style.pointerEvents = 'auto';
            }

            // Download Function - Fixed version
            function downloadWasm() {
                console.log('Download function called');
                console.log('compiledWasmData:', compiledWasmData);
                
                if (!compiledWasmData || compiledWasmData.length === 0) {
                    setStatus('error', 'Hata: İndirilecek dosya yok');
                    alert('Önce bir kod derleyin!');
                    return;
                }
                
                try {
                    // Create blob from Uint8Array
                    const blob = new Blob([compiledWasmData], { type: 'application/wasm' });
                    console.log('Blob created:', blob);
                    
                    // Create download link
                    const url = window.URL.createObjectURL(blob);
                    console.log('URL created:', url);
                    
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'output.wasm';
                    link.style.display = 'none';
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Clean up
                    setTimeout(() => {
                        window.URL.revokeObjectURL(url);
                    }, 100);
                    
                    setStatus('success', 'İndirme başlatıldı');
                    console.log('Download initiated successfully');
                } catch (error) {
                    console.error('Download error:', error);
                    setStatus('error', 'İndirme hatası');
                    alert('İndirme sırasında bir hata oluştu: ' + error.message);
                }
            }

            function clearAll() {
                cppInput.value = "";
                wasmOutput.value = "";
                compiledWasmData = null;
                fileSize.innerText = "0 KB";
                downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                downloadBtn.style.pointerEvents = 'none';
                updateLineNumbers(cppInput, lineNumbersCpp);
                updateLineNumbers(wasmOutput, lineNumbersWasm);
                setStatus('ready', 'Hazır');
                cppInput.focus();
            }

            function formatBytes(bytes, decimals = 2) {
                if (!bytes || bytes === 0) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            }

            // Handle Tab key in textarea
            cppInput.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });

            // Attach event listeners
            compileBtn.addEventListener('click', compileCode);
            downloadBtn.addEventListener('click', downloadWasm);
            clearBtn.addEventListener('click', clearAll);

            // Make downloadWasm globally accessible (for onclick attribute)
            window.downloadWasm = downloadWasm;
        })();
    </script>
</body>
</html>
