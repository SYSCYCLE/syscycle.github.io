<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wasm to Byte Array Converter (Fixed)</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 90%; max-width: 800px; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .drop-zone { border: 2px dashed #4db8ff; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 250px; background: #000; color: #00ff41; border: 1px solid #444; font-family: monospace; padding: 10px; box-sizing: border-box; }
        .btn { background: #4db8ff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 4px; }
        .info { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wasm to Byte Array</h1>
        <div id="dropZone" class="drop-zone">Wasm dosyasını buraya sürükle veya seç</div>
        <input type="file" id="fileInput" accept=".wasm" style="display: none;">
        
        <textarea id="output" placeholder="Çıktı buraya gelecek..." readonly></textarea>
        <button class="btn" onclick="copyToClipboard()">Kodu Kopyala</button>
        <p id="status" class="info"></p>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "#222"; };
        dropZone.ondragleave = () => dropZone.style.background = "transparent";
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = new Uint8Array(e.target.result);
                let result = "const wasmCode = new Uint8Array([\n    ";
                
                for (let i = 0; i < buffer.length; i++) {
                    const hex = "0x" + buffer[i].toString(16).padStart(2, '0');
                    result += hex + (i === buffer.length - 1 ? "" : ", ");
                    if ((i + 1) % 12 === 0) result += "\n    ";
                }
                
                result += "\n]);";
                output.value = result;
                status.innerText = `${file.name} işlendi. Toplam: ${buffer.length} byte.`;
            };
            reader.readAsArrayBuffer(file);
        }

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert("Kopyalandı!");
        }
    </script>
</body>
</html>
