<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasm to Byte Array Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 90%; max-width: 800px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { color: #4db8ff; margin-bottom: 10px; }
        .drop-zone { border: 2px dashed #4db8ff; padding: 40px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .drop-zone:hover { background: rgba(77, 184, 255, 0.1); }
        textarea { width: 100%; height: 200px; background: #111; color: #00ff41; border: 1px solid #444; border-radius: 6px; padding: 10px; font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; }
        .btn { background: #4db8ff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #38a1e6; }
        .info { font-size: 0.9em; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wasm ➔ Uint8Array</h1>
        <p>Wasm dosyanı sürükle veya seç, anında JavaScript koduna dönüşsün.</p>
        
        <div id="dropZone" class="drop-zone">
            Wasm dosyasını buraya sürükle veya tıklayarak seç
            <input type="file" id="fileInput" accept=".wasm" style="display: none;">
        </div>

        <textarea id="output" placeholder="Çıktı burada görünecek..." readonly></textarea>
        
        <button class="btn" onclick="copyToClipboard()">Kodu Kopyala</button>
        <p id="status" class="info"></p>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#fff'; };
        dropZone.ondragleave = () => dropZone.style.borderColor = '#4db8ff';
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#4db8ff';
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file || !file.name.endsWith('.wasm')) {
                alert("Lütfen geçerli bir .wasm dosyası seçin!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = new Uint8Array(e.target.result);
                let hexString = "const wasmCode = new Uint8Array([\n  ";
                
                for (let i = 0; i < buffer.length; i++) {
                    let hex = buffer[i].toString(16).padStart(2, '0');
                    hexString += "0x" + hex + (i === buffer.length - 1 ? "" : ", ");
                    
                    if ((i + 1) % 12 === 0) hexString += "\n  ";
                }
                
                hexString += "\n]);";
                output.value = hexString;
                status.innerText = `Dosya İşlendi: ${file.name} (${buffer.length} byte)`;
            };
            reader.readAsArrayBuffer(file);
        }

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert("Kod panoya kopyalandı!");
        }
    </script>
</body>
</html>
